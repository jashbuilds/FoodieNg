<form [formGroup]="form"
    class="addItemForm px-4 py-4 rounded-4 mt-5 bg-almond-cream bg-gradient shadow"
    (ngSubmit)="onSubmit()">

    <!-- Form heading -->
    <div class="d-flex mb-3 justify-content-center align-items-center gap-3">
        <span class="fs-2 text-center color-dusty-olive fw-bold">Add Item</span>
        <img src="icons/menu-board-icon.svg" alt="menu-icon" width="35"
            height="35">
    </div>

    <!-- Form fields -->
    <div class="mb-3">
        <label for="itemName" class="form-label fs-4 text-muted">Item Name</label>
        <input type="text" class="form-control" id="itemName"
            aria-describedby="itemName" placeholder="Enter Item Name"
            formControlName="itemName"
            [class.is-invalid]="form.get('itemName')?.invalid && form.get('itemName')?.touched"
            [class.valid]="form.get('itemName')?.valid">
        <div class="invalid-feedback">
            *Enter valid Item name!
        </div>
    </div>

    <div class="mb-3">
        <label for="imageUrl" class="form-label fs-4 text-muted">Image URL</label>
        <input type="text" class="form-control" id="imageUrl"
            formControlName="imageUrl"
            [class.is-invalid]="form.get('imageUrl')?.invalid && form.get('imageUrl')?.touched"
            [class.valid]="form.get('imageUrl')?.valid"
            placeholder="Enter ImageURL">
        @if (form.get('imageUrl')?.hasError('required')) {
        <div class="invalid-feedback">
            *Image URL is required!
        </div>
        }
        @if (form.get('imageUrl')?.hasError('pattern')) {
        <div class="invalid-feedback">
            *URL must end with .jpg, .jpeg, .png, or .webp
        </div>
        }
    </div>
    
    <div class="mb-3">
        <label for="category"
            class="form-label fs-4 text-muted">Category</label>
        <select class="form-select" aria-label="category"
            formControlName="category"
            [class.is-invalid]="form.get('category')?.invalid && form.get('category')?.touched"
            [class.valid]="form.get('category')?.valid">
            <option value selected>Select Category</option>
            <option value="south-indian">South Indian</option>
            <option value="gujarati">Gujarati</option>
            <option value="punjabi">Punjabi</option>
            <option value="mexican">Mexican</option>
        </select>
        <div class="invalid-feedback">
            *Select at least one Category!
        </div>
    </div>

    <div class="d-flex align-items-center justify-content-between gap-md-3 flex-wrap">
        <div class="col-lg-6">
            <label for="price" class="form-label fs-4 text-muted">Price</label>
            <div class="input-group"
                [class.is-invalid]="form.get('price')?.invalid && form.get('price')?.touched"
                [class.valid]="form.get('price')?.valid">
                <span class="input-group-text bg-body" id="price">₹</span>
                <input type="number" id="price" class="form-control border-start-0" placeholder="Enter Price"
                    aria-label="Username"
                    aria-describedby="price" min="0" formControlName="price"
                    (keydown)="validateNumber($event)">
            </div>
            <div class="invalid-feedback">
                *Enter valid Price!
            </div>
        </div>
        <div class="my-4 form-check align-content-center">
            <input type="checkbox" class="mt-2 form-check-input" id="category"
                formControlName="isSpecial" width="30" height="30">
            <label class="form-check-label fs-5 text-muted" for="category">Special Item</label>
        </div>
    </div>
    
    <div class="d-flex justify-content-end align-items-center gap-2 mt-sm-3">
        <button type="button"
            class="btn px-4 resetBtn text-muted cursor-pointer bg-gradient border border-secondary"
            (click)="onResetForm()">Reset</button>
        <button type="submit"
            class="btn px-4 submitBtn text-white cursor-pointer bg-gradient border-0"
            [disabled]="form.invalid">Add</button>
    </div>
</form>
