<div class="mt-5 px-sm-4">
    @if(availableItems().length === 0) {

    <!-- Empty message -->
    <div
        class="border border-2 rounded-4 itemsGrid d-flex flex-column justify-content-center align-items-center min-vh-60">
        <p class="fs-3 fw-bold color-dusty-olive m-0 text-nowrap">No Items
            Available!</p>
        <p class="fw-medium color-camel">Please add Item to Preview.</p>
    </div>
    } @else {

    <div class="d-flex justify-content-end align-items-center gap-2">
        <p class="fs-2 m-0 fw-semibold text-end color-dusty-olive m-0">Available
            Items</p>
        <img src="icons/food-icon-1.svg" alt="food-icon" width="35" height="35">
    </div>

    <hr class="color-dusty-olive border-3 rounded-4 my-4">

    <!-- Available item cards -->
    <div class="row g-4">
        @for (item of availableItems(); track $index) {

        <div class="col-lg-6">
            <div
                class="card itemsCard h-100 rounded-4 shadow border-0 d-flex justify-content-center">
                <div class="row g-0">

                    <!-- Item image -->
                    <div
                        class="col-5 p-3 d-flex justify-content-center align-items-center position-relative">
                        <img [src]="item.imageUrl"
                            class="img-fluid rounded-4 itemImg"
                            alt="item-{{ $index }}">
                        <img width="40" height="40" appTooltip
                            title="Special Item"
                            [src]="item.isSpecial ? 'icons/special-icon.svg' : ''"
                            alt="special-icon"
                            [class]="item.isSpecial ? 'position-absolute top-0 start-0 mt-1' : 'visually-hidden'">
                    </div>

                    <!-- Item details -->
                    <div class="col-7">
                        <div
                            class="card-body h-100 d-flex justify-content-between flex-column">
                            <div>
                                <div
                                    class="d-flex justify-content-between gap-2">
                                    <h5
                                        class="card-title fw-bold fs-3 color-dusty-olive">{{
                                        item.itemName }}</h5>
                                    <img appTooltip title="Add To Menu"
                                        src="icons/add-icon.svg" alt="add-item"
                                        class="addIcon img-fluid cursor-pointer"
                                        width="25" height="25"
                                        (click)="addToMenu(item)">
                                </div>
                                <p
                                    class="card-text fw-medium fs-4 color-camel">{{
                                    item.category }}</p>
                            </div>
                            <div class="d-flex justify-content-end ">
                                <p
                                    class="card-text fw-medium fs-4 color-coffee-bean">{{
                                    item.price | currency:'INR' }}</p>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>

        }
    </div>

    }
</div>

<!-- Toast Container -->
<div
    class="toast-container position-fixed bottom-0 end-0 p-3">
    <div appToast
        class="toast align-items-center text-white bg-camel border-0"
        role="alert" aria-live="assertive"
        aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">
                Item added to Menu!
            </div>
            <button type="button"
                class="btn-close btn-close-white me-2 m-auto"
                data-bs-dismiss="toast"
                aria-label="Close"></button>
        </div>
    </div>
</div>
